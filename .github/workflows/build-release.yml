name: Build and Publish Arch Repository

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - 'packages.txt'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-repo
  cancel-in-progress: true

env:
  RELEASE_TAG: repository
  REPO_DB_NAME: nanoka

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: cachyos/cachyos
    steps:
      - name: Install base dependencies
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm --needed git subversion mercurial sudo rsync github-cli fakeroot binutils pacman-contrib paru curl awk tar
          id builder >/dev/null 2>&1 || useradd -m builder
          grep -q '^builder ALL=(ALL) NOPASSWD: ALL$' /etc/sudoers || echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Configure makepkg for x86-64-v3 optimization
        run: |
          set -euo pipefail
          echo "Downloading CachyOS v3 makepkg.conf..."
          curl -sLo /etc/makepkg.conf https://raw.githubusercontent.com/CachyOS/docker-makepkg/refs/heads/master/docker-makepkg-v3/makepkg.conf
          echo "Downloading CachyOS v3 rust.conf..."
          mkdir -p /etc/makepkg.conf.d
          curl -sLo /etc/makepkg.conf.d/rust.conf https://raw.githubusercontent.com/CachyOS/docker-makepkg/refs/heads/master/docker-makepkg-v3/rust.conf
          sed -i 's/^PKGDEST=/#PKGDEST=/g' /etc/makepkg.conf
          sed -i 's/^LOGDEST=/#LOGDEST=/g' /etc/makepkg.conf
          sed -i 's/^PACKAGECARCH=/#PACKAGECARCH=/g' /etc/makepkg.conf

      - name: Configure pacman options and custom repository
        run: |
          set -euo pipefail
          tmp=$(mktemp)
          awk '
            BEGIN { inserted=0 }
            /^\[options\]$/ && !inserted { print; print "DisableSandboxNetwork"; inserted=1; next }
            { print }
            END { if (!inserted) exit 1 }
          ' /etc/pacman.conf > "$tmp"
          cat "$tmp" > /etc/pacman.conf
          rm -f "$tmp"

          cat <<EOF >> /etc/pacman.conf

          [towjacix]
          SigLevel = Optional TrustAll
          Server = https://github.com/towjacix/aur-repo/releases/download/repository
          EOF
          pacman -Sy || true

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Fix workspace ownership for build user
        run: chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Fetch existing packages and metadata to cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p cache output /tmp/repo-files
          echo "Downloading existing artifacts to cache/"
          gh release download "$RELEASE_TAG" --repo "${{ github.repository }}" --dir cache --pattern "*.pkg.tar.zst" 2>/dev/null || true
          gh release download "$RELEASE_TAG" --repo "${{ github.repository }}" --dir cache --pattern "${REPO_DB_NAME}.files.tar.gz" 2>/dev/null || true

          if [[ -f "cache/${REPO_DB_NAME}.files.tar.gz" ]]; then
             tar -xzf "cache/${REPO_DB_NAME}.files.tar.gz" -C /tmp/repo-files 2>/dev/null || true
          fi

      - name: Build and filter current packages
        id: build
        run: |
          set -euo pipefail
          BUILT=()
          SKIPPED=()
          FAILED=()

          for dir in */ ; do
            dir="${dir%/}"
            case "$dir" in
              .github|cache|output) continue ;;
            esac
            [[ -f "$dir/PKGBUILD" ]] || continue

            echo "Checking status for $dir"

            if grep -q 'pkgver()' "$dir/PKGBUILD"; then
              sudo -u builder bash -lc "cd '$GITHUB_WORKSPACE/$dir' && makepkg -od --noprepare --skipinteg" >/dev/null 2>&1 || true
            fi

            EXPECTED_PKGS=$(sudo -u builder bash -lc "cd '$GITHUB_WORKSPACE/$dir' && makepkg --packagelist 2>/dev/null" || true)

            NEEDS_BUILD=false
            if [[ -z "$EXPECTED_PKGS" ]]; then
               NEEDS_BUILD=true
            else
               for pkg_path in $EXPECTED_PKGS; do
                 pkg_basename=$(basename "$pkg_path")
                 if [[ ! -f "cache/$pkg_basename" ]]; then
                   NEEDS_BUILD=true
                   break
                 fi
               done
            fi

            if [[ "$NEEDS_BUILD" == "false" ]]; then
               echo "Package $dir is up to date. Moving from cache."
               for pkg_path in $EXPECTED_PKGS; do
                 pkg_basename=$(basename "$pkg_path")
                 mv "cache/$pkg_basename" "output/"
               done
               SKIPPED+=("$dir")
               continue
            fi

            echo "Building $dir with paru"
            sudo -u builder bash -lc "cd '$GITHUB_WORKSPACE/$dir' && paru --noconfirm --skipreview --useask --removemake --nocheck -B '$GITHUB_WORKSPACE/$dir'" >/tmp/build-"$dir".log 2>&1 || true
            
            if ls "$dir"/*.pkg.tar.zst >/dev/null 2>&1; then
              mv "$dir"/*.pkg.tar.zst output/
              BUILT+=("$dir")
              echo "Build OK: $dir"
            else
              echo "Build failed for $dir"
              tail -n 250 /tmp/build-"$dir".log || true
              FAILED+=("$dir")

              echo "Triggering fallback mechanism for $dir..."
              FALLBACK_SUCCESS=false

              if [[ -d /tmp/repo-files ]]; then
                for desc_file in /tmp/repo-files/*/desc; do
                  [[ -f "$desc_file" ]] || continue

                  base_pkg=$(awk '/^%BASE%/{getline; print; exit}' "$desc_file")
                  pkg_name=$(awk '/^%NAME%/{getline; print; exit}' "$desc_file")
                  check_name="${base_pkg:-$pkg_name}"

                  if [[ "$check_name" == "$dir" ]]; then
                    file_name=$(awk '/^%FILENAME%/{getline; print; exit}' "$desc_file")
                    
                    if [[ -n "$file_name" && -f "cache/$file_name" ]]; then
                      echo "Restoring $file_name from previous release"
                      cp "cache/$file_name" output/
                      FALLBACK_SUCCESS=true
                    fi
                  fi
                done
              fi

              if [[ "$FALLBACK_SUCCESS" == "false" ]]; then
                echo "Fallback failed for $dir: no previous files found."
              fi
            fi
            
            sudo -u builder rm -rf "$GITHUB_WORKSPACE/$dir/src" "$GITHUB_WORKSPACE/$dir/pkg"
            pacman -Sy --noconfirm >/dev/null 2>&1 || true
          done

          echo "built=${BUILT[*]}" >> "$GITHUB_OUTPUT"
          echo "skipped=${SKIPPED[*]}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED[*]}" >> "$GITHUB_OUTPUT"

          echo "Built: ${BUILT[*]:-none}"
          echo "Skipped: ${SKIPPED[*]:-none}"
          echo "Failed: ${FAILED[*]:-none}"

          if [[ ${#BUILT[@]} -eq 0 && ${#FAILED[@]} -eq 0 ]]; then
            echo "has_new_builds=false" >> "$GITHUB_OUTPUT"
            echo "100% packages fetched from cache. Release skipped."
          else
            echo "has_new_builds=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate fresh pacman database
        if: steps.build.outputs.has_new_builds == 'true'
        run: |
          set -euo pipefail
          cd output
          shopt -s nullglob
          pkgs=( *.pkg.tar.zst )
          if (( ${#pkgs[@]} == 0 )); then
            echo "No packages exist. Repository is empty."
            exit 0
          fi
          echo "Generating clean database from active packages only."
          repo-add "${REPO_DB_NAME}.db.tar.gz" "${pkgs[@]}"

      - name: Publish to GitHub Release
        if: steps.build.outputs.has_new_builds == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          TAG="${{ env.RELEASE_TAG }}"

          shopt -s nullglob
          if [[ -z "$(ls -A output 2>/dev/null)" ]]; then
             echo "Output is empty. Nothing to publish."
             exit 0
          fi

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Cleaning up all old assets to remove deleted packages."
            gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' \
              | while read -r name; do
                  [[ -n "$name" ]] || continue
                  gh release delete-asset "$TAG" "$name" --repo "$REPO" -y || true
                done
          else
            echo "Creating release $TAG."
            gh release create "$TAG" --repo "$REPO" \
              --title "Arch Package Repository" \
              --notes "Auto-built pacman repository."
          fi

          echo "Uploading current assets."
          gh release upload "$TAG" output/* --repo "$REPO" --clobber

          FORMATTED_BUILT=""
          for p in ${{ steps.build.outputs.built }}; do FORMATTED_BUILT+=$'\n'"- 🟢 $p"; done
          [[ -z "$FORMATTED_BUILT" ]] && FORMATTED_BUILT=$'\n'"- None"

          FORMATTED_SKIPPED=""
          for p in ${{ steps.build.outputs.skipped }}; do FORMATTED_SKIPPED+=$'\n'"- 🟡 $p"; done
          [[ -z "$FORMATTED_SKIPPED" ]] && FORMATTED_SKIPPED=$'\n'"- None"

          FORMATTED_FAILED=""
          for p in ${{ steps.build.outputs.failed }}; do FORMATTED_FAILED+=$'\n'"- 🔴 $p (Restored via Fallback)"; done
          [[ -z "$FORMATTED_FAILED" ]] && FORMATTED_FAILED=$'\n'"- None"

          RELEASE_NOTES=$(cat <<EOF
          ### 📦 Repository Update Summary

          **Last Updated:** $(date -u '+%Y-%m-%d %H:%M UTC')

          #### 🟢 Newly Built Packages
          $FORMATTED_BUILT

          #### 🟡 Cached / Skipped Packages
          $FORMATTED_SKIPPED

          #### 🔴 Failed Packages (VCS Down / Build Error)
          $FORMATTED_FAILED

          ---
          *Automated generation by GitHub Actions.*
          EOF
          )

          gh release edit "$TAG" --repo "$REPO" --notes "$RELEASE_NOTES"
